name: MXHRM CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build Backend and Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: client/mxhrm-web/package-lock.json

      - name: Restore backend
        run: dotnet restore src/MXHRM.Api/MXHRM.Api.csproj

      - name: Build backend
        run: dotnet build src/MXHRM.Api/MXHRM.Api.csproj --configuration Release --no-restore

      - name: Install frontend dependencies
        working-directory: client/mxhrm-web
        run: npm ci

      - name: Build frontend
        working-directory: client/mxhrm-web
        run: npm run build