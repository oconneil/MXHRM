name: MXHRM CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'src/**'
      - 'client/mxhrm-web/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/**'
      - 'Makefile'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'src/**'
      - 'client/mxhrm-web/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/**'
      - 'Makefile'
  workflow_dispatch:

jobs:
  build:
    name: Build Backend and Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: client/mxhrm-web/package-lock.json

      - name: Restore backend
        run: dotnet restore src/MXHRM.Api/MXHRM.Api.csproj

      - name: Build backend
        run: dotnet build src/MXHRM.Api/MXHRM.Api.csproj --configuration Release --no-restore

      - name: Install frontend dependencies
        working-directory: client/mxhrm-web
        run: npm ci

      - name: Build frontend
        working-directory: client/mxhrm-web
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v5
        with:
          name: mxhrm-web-dist
          path: client/mxhrm-web/dist/mxhrm-web/browser
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create CI env file
        env:
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD || 'P@ssw0rd' }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'THIS_IS_CI_SECRET_KEY_CHANGE_ME_1234567890' }}
          SEQ_ADMIN_PASSWORD: ${{ secrets.SEQ_ADMIN_PASSWORD || 'P@ssw0rd' }}
        run: |
          cat > .env <<EOF
          MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
          MXHRM_DB_NAME=MXHRM

          JWT_ISSUER=MXHRM.Api
          JWT_AUDIENCE=MXHRM.Web
          JWT_SECRET_KEY=${JWT_SECRET_KEY}
          JWT_ACCESS_TOKEN_MINUTES=15

          SEQ_ADMIN_USERNAME=admin
          SEQ_ADMIN_PASSWORD=${SEQ_ADMIN_PASSWORD}
          EOF

      - name: Validate Docker Compose config
        run: docker compose --profile infra --profile app config

      - name: Build API image
        run: docker build -f src/MXHRM.Api/Dockerfile -t mxhrm-api:ci .

      - name: Build Web image
        run: docker build -f client/mxhrm-web/Dockerfile -t mxhrm-web:ci .