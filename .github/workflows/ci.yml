name: MXHRM CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'src/**'
      - 'tests/**'
      - 'client/mxhrm-web/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/**'
      - 'Makefile'
  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - 'src/**'
      - 'tests/**'
      - 'client/mxhrm-web/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/**'
      - 'Makefile'
  workflow_dispatch:

jobs:
  build:
    name: Build Backend and Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: client/mxhrm-web/package-lock.json

      - name: Restore backend
        run: dotnet restore src/MXHRM.Api/MXHRM.Api.csproj

      - name: Build backend
        run: dotnet build src/MXHRM.Api/MXHRM.Api.csproj --configuration Release --no-restore

      - name: Test backend
        run: |
          dotnet test tests/MXHRM.Application.Tests --configuration Release
          dotnet test tests/MXHRM.Infrastructure.Tests --configuration Release

      - name: Install frontend dependencies
        working-directory: client/mxhrm-web
        run: npm ci

      - name: Build frontend
        working-directory: client/mxhrm-web
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: mxhrm-web-dist
          path: client/mxhrm-web/dist/mxhrm-web/browser
          if-no-files-found: error
          retention-days: 7

      - name: Write build summary
        run: |
          {
            echo "## MXHRM CI Build Summary"
            echo ""
            echo "| Check | Status |"
            echo "|---|---|"
            echo "| Backend restore | Passed |"
            echo "| Backend release build | Passed |"
            echo "| Backend tests | Passed |"
            echo "| Frontend npm ci | Passed |"
            echo "| Frontend production build | Passed |"
            echo "| Frontend artifact | Uploaded |"
            echo ""
            echo "Artifact: \`mxhrm-web-dist\`"
          } >> "$GITHUB_STEP_SUMMARY"

  docker:
    name: Build and Publish Docker Images
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create CI env file
        env:
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD || 'P@ssw0rd' }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'THIS_IS_CI_SECRET_KEY_CHANGE_ME_1234567890' }}
          SEQ_ADMIN_PASSWORD: ${{ secrets.SEQ_ADMIN_PASSWORD || 'P@ssw0rd' }}
        run: |
          cat > .env <<EOF
          MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
          MXHRM_DB_NAME=MXHRM

          JWT_ISSUER=MXHRM.Api
          JWT_AUDIENCE=MXHRM.Web
          JWT_SECRET_KEY=${JWT_SECRET_KEY}
          JWT_ACCESS_TOKEN_MINUTES=15

          SEQ_ADMIN_USERNAME=admin
          SEQ_ADMIN_PASSWORD=${SEQ_ADMIN_PASSWORD}
          EOF

      - name: Validate Docker Compose config
        run: docker compose --profile infra --profile app config

      - name: Extract API Docker metadata
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/mxhrm-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract Web Docker metadata
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/mxhrm-web
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/MXHRM.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: client/mxhrm-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

      - name: Write Docker summary
        run: |
          {
            echo "## MXHRM Docker Image Summary"
            echo ""
            echo "| Check | Status |"
            echo "|---|---|"
            echo "| Docker Compose config | Passed |"
            echo "| API Docker image build | Passed |"
            echo "| Web Docker image build | Passed |"
            echo "| Push images | ${{ github.event_name != 'pull_request' && 'Enabled' || 'Skipped for PR' }} |"
            echo ""
            echo "API image tags:"
            echo ""
            echo '${{ steps.meta-api.outputs.tags }}'
            echo ""
            echo "Web image tags:"
            echo ""
            echo '${{ steps.meta-web.outputs.tags }}'
          } >> "$GITHUB_STEP_SUMMARY"
