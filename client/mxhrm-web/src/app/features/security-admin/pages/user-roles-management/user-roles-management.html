<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="h3 mb-1">User Roles</h1>
        <p class="text-muted mb-0">
            Manage roles for user:
            <strong>{{ userName() || userId }}</strong>
        </p>
    </div>

    <a kendoButton fillMode="outline" routerLink="/security-admin/users">
        Back to Users
    </a>
</div>

@if (errorMessage()) {
<div class="alert alert-danger">{{ errorMessage() }}</div>
}

@if (successMessage()) {
<div class="alert alert-success">{{ successMessage() }}</div>
}

<div class="card">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2 class="h5 mb-1">Roles</h2>
                <p class="text-muted mb-0">
                    Select roles assigned to this user.
                </p>
            </div>

            <button kendoButton themeColor="primary" type="button" (click)="save()" [disabled]="loading() || saving()">
                Save Roles
            </button>
        </div>

        <kendo-grid [data]="allRoles()" [height]="560" [loading]="loading()">
            <kendo-grid-column title="" [width]="80">
                <ng-template kendoGridCellTemplate let-dataItem>
                    <input class="form-check-input" type="checkbox" [checked]="isSelected(dataItem.id)"
                        (change)="toggleRole(dataItem.id, $any($event.target).checked)" />
                </ng-template>
            </kendo-grid-column>

            <kendo-grid-column field="name" title="Role Name">
            </kendo-grid-column>

            <kendo-grid-column field="id" title="Role ID" [width]="320">
            </kendo-grid-column>
        </kendo-grid>
    </div>
</div>
