<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h1 class="h4 mb-3">Login</h1>

        @if (errorMessage()) {
        <div class="alert alert-danger">{{ errorMessage() }}</div>
        }

        <form [formGroup]="form" (ngSubmit)="login()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" type="text" formControlName="userName" />
            @for (message of fieldErrors('userName'); track message) {
            <div class="text-danger small mt-1">
              {{ message }}
            </div>
            }
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" formControlName="password" />
            @for (message of fieldErrors('password'); track message) {
            <div class="text-danger small mt-1">
              {{ message }}
            </div>
            }

          </div>

          <div class="mb-3">
            <label class="form-label">Company ID</label>
            <input class="form-control" type="text" formControlName="companyID" />
            @for (message of fieldErrors('companyID'); track message) {
            <div class="text-danger small mt-1">
              {{ message }}
            </div>
            }
          </div>

          <button class="btn btn-primary w-100" type="submit" [disabled]="loading()">
            {{ loading() ? 'Logging in...' : 'Login' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
