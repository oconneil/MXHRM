services:
  seq:
    image: datalust/seq:latest
    container_name: mxhrm-seq
    restart: unless-stopped
    ports:
      - "5341:80"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINUSERNAME=${SEQ_ADMIN_USERNAME}
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD}
    volumes:
      - seq-data:/data

  redis:
    image: redis:7-alpine
    container_name: mxhrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: mxhrm-sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ghcr.io/oconneil/mxhrm-api:${IMAGE_TAG:-latest}
    container_name: mxhrm-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      seq:
        condition: service_started
      sqlserver:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Container
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${MXHRM_DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"

      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__AccessTokenMinutes: "${JWT_ACCESS_TOKEN_MINUTES}"

      Redis__ConnectionString: "redis:6379"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ghcr.io/oconneil/mxhrm-web:${IMAGE_TAG:-latest}
    container_name: mxhrm-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  seq-data:
  redis-data:
  sqlserver-data: