# x-* = extension field — Docker จะ "มองข้าม" key ที่ขึ้นต้นด้วย x- ตอนรัน
# แต่เราใช้มันเก็บ "แม่แบบ" ที่จะ reuse ได้ ผ่าน anchor (&default-logging)
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"     # ไฟล์ log 1 ไฟล์ใหญ่ได้ไม่เกิน 10MB
    max-file: "3"       # เก็บย้อนหลังได้ 3 ไฟล์ → รวมสูงสุด ~30MB ต่อ container

services:
  seq:
    image: datalust/seq:latest
    container_name: mxhrm-seq
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"      # ใช้ CPU ได้สูงสุด 1 core
          memory: 1g       # ชน 1GB เมื่อไหร่ OOM kill — log store ไม่ควรกินเกินนี้
        reservations:
          memory: 256m     # การันตีขั้นต่ำให้ start ได้เสมอ
    ports:
      - "127.0.0.1:5341:80"
    environment:
      - ACCEPT_EULA=Y
      - TZ=${TZ:-Asia/Bangkok}
      - SEQ_FIRSTRUN_ADMINUSERNAME=${SEQ_ADMIN_USERNAME}
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD}
    volumes:
      - seq-data:/data

  redis:
    image: redis:7-alpine
    container_name: mxhrm-redis
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384m     # เผื่อ overhead เหนือ maxmemory ที่ตั้งใน command
        reservations:
          memory: 64m
    environment:
      - TZ=${TZ:-Asia/Bangkok}
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    # --maxmemory 256mb: บอก redis เองให้ evict cache ก่อนชน container limit (กัน OOM kill)
    # allkeys-lru: เมื่อเต็ม ลบ key ที่ไม่ได้ใช้นานสุดออกก่อน
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: mxhrm-sqlserver
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3g       # งานหนักสุดในระบบ
        reservations:
          memory: 2g       # ⚠️ Azure SQL Edge ต้องการ >= 2GB ถึงจะ start ได้
    # ports:
    #   - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      TZ: "${TZ:-Asia/Bangkok}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - sqlserver-backups:/var/opt/mssql/backups
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ghcr.io/oconneil/mxhrm-api:${IMAGE_TAG:-latest}
    container_name: mxhrm-api
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g       # .NET runtime + request processing
        reservations:
          memory: 384m
    depends_on:
      redis:
        condition: service_started
      seq:
        condition: service_started
      sqlserver:
        condition: service_healthy
    # ports:
    #   - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Container
      ASPNETCORE_URLS: http://+:8080
      TZ: "${TZ:-Asia/Bangkok}"

      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${MXHRM_DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"

      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__AccessTokenMinutes: "${JWT_ACCESS_TOKEN_MINUTES}"

      Redis__ConnectionString: "redis:6379"
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mxhrm-uploads:/app/App_Data/uploads

  web:
    image: ghcr.io/oconneil/mxhrm-web:${IMAGE_TAG:-latest}
    container_name: mxhrm-web
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192m     # nginx เสิร์ฟไฟล์ static เบามาก
        reservations:
          memory: 32m
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    environment:
      - TZ=${TZ:-Asia/Bangkok}
    depends_on:
      - api
    ports:
      - "8088:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  seq-data:
  redis-data:
  sqlserver-data:
  sqlserver-backups:
  mxhrm-uploads: